apiVersion: apps/v1
kind: Deployment
metadata:
  name: poc-app
  labels:
    app: poc-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: poc-app
  template:
    metadata:
      labels:
        app: poc-app
    spec:
      containers:
      - name: web-app
        image: REPLACE_WITH_YOUR_ACR_NAME.azurecr.io/poc-app:latest
        ports:
        - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: poc-app-service
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 3000
  selector:
    app: poc-app
